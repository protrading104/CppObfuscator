skip_contains:
- << std::wstring(process.processName.begin()
- << std::wstring(process.processPath.begin()
- << std::string(process.namedPipes[j].begin()
- << arg_ptr.shortoption <<
- << arg.shortoption <<
- << arg.help <<
- << arg_ptr.longoption <<
- << arg.longoption <<
- << arg_ptr.name <<
- << arg_ptr.help <<
- << std::get<int>(arg.value)
- << std::get<std::string>(arg.value)
- << std::get<std::string>(value)
- << std::get<int>(value)
- '<<'
skip_exact:
  .begin(): iterator usage
  .c_str(): C-style conversion
  .end(): iterator usage
  .length(): length accessor
  .size(): length accessor
  std::get<: template accessor
  std::string(: STL string constructor
skip_keywords:
  \\\\: double backslash artifact
  help: reserved keyword
  json: reserved keyword
  show: reserved keyword
  text: reserved keyword
syntax_noise:
- - ^\s*}$
  - trailing bracket
- - ^\s*\]+$
  - closing square brackets
- - ^\s*\[\s*$
  - opening square bracket
- - ^\s*$
  - empty or whitespace-only line
