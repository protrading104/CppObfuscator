regex_patterns:
- - \\\\PIPE\\
  - named pipe visual marker
- - ^\s*[│├─\s]+\\\\PIPE\\
  - visual tree line with PIPE path
- - ^\s*- \(.+\)$
  - status marker like - (Access Denied)
- - ^\s*[-│└├─\\]+$
  - visual tree line
- - ^\s*\}$
  - closing brace
- - ^\s*\\$
  - single trailing backslash
- - ^\s*\|
  - ASCII pipe box
- - ^\s*\├── .+
  - visual structure tree
- - ^\s*\└────\\n$
  - decorated block end
- - ^\s*- \(.+\)$
  - error marker like - (Access Denied)
- - ^\s*[-│└├─\\]+$
  - visual decoration
- - ^\s*\\+$
  - visual backslashes
- - ^\s*}$
  - closing brace
- - ^\s*\<$
  - generic visual CLI decoration
- - ^\s*\>$
  - generic visual CLI decoration
- - \\\\PIPE\\
  - named pipe marker
- - ^\[!\] Error:.*$
  - debug output message
- - '- \(Unknown\)'
  - status string
- - '- \(Access Denied\)'
  - status string
- - \\\\PIPE\\
  - pipe path
- - '[│├─\s]+\\PIPE\\'
  - decorated pipe path
- - \\PIPE\\
  - any pipe reference
- - '        \\'
